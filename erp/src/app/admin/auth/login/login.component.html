<div class="main-content">
  <div class="form-wrp">
    <div class="form">
      <div class="contact-form">
        <h2>Administrace</h2>
        <form (ngSubmit)="onLogin()">
          <div class="form-group">
            <label for="email">Login</label>
            <input 
              type="email" 
              id="email" 
              [(ngModel)]="email" 
              name="email" 
              placeholder="jannovak1" 
              required>
          </div>

          <div class="form-group">
            <label for="password">Heslo</label>
            <div class="password-wrapper">
              <input 
                [type]="showPassword ? 'text' : 'password'" 
                id="password" 
                [(ngModel)]="password" 
                name="password" 
                placeholder="••••••••" 
                required>
              
              <button 
                type="button" 
                class="toggle-password" 
                (click)="showPassword = !showPassword"
                [title]="showPassword ? 'Skrýt heslo' : 'Zobrazit heslo'">
                
                <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>

                <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          

          <div class="submit-wrp">
            <button type="submit">Přihlásit se</button>
          </div>
        </form>
<div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
          </div>
        <div class="back-to-home">
          <a routerLink="/home" class="home-link">Zpět na hlavní stránku</a>
        </div>
      </div>
    </div>
  </div>
</div>
