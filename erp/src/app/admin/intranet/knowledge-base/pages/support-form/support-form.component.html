<div class="kb-form-container">
  <ng-container *ngIf="!isSubmitted; else thankYouMessage">
    <div class="kb-form-header">
      <span class="doc-code">SUPPORT_TICKET_SYSTEM</span>
      <h1>Vytvořit servisní požadavek</h1>
      <p>Vyplňte prosím podrobnosti vašeho požadavku. Naši technici se mu budou věnovat.</p>
    </div>

    <form [formGroup]="supportForm" (ngSubmit)="onSubmit()" class="kb-form-body">
      
      <div class="kb-form-row">
        <div class="form-group flex-1">
          <label>Kategorie <span class="req">*</span></label>
          <select formControlName="category">
            <option value="it">IT / Technický problém</option>
            <option value="obchod">Obchodní oddělení</option>
            <option value="chyba">Nahlášení chyby</option>
            <option value="ostatni">Ostatní</option>
          </select>
        </div>

        <div class="form-group flex-1">
          <label>Priorita <span class="req">*</span></label>
          <select formControlName="priority">
            <option value="low">Nízká</option>
            <option value="medium">Střední</option>
            <option value="high">Vysoká</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Předmět požadavku <span class="req">*</span></label>
        <input type="text" formControlName="subject" placeholder="Stručný titulek problému">
      </div>

      <div class="form-group">
        <label>Detailní popis <span class="req">*</span></label>
        <textarea formControlName="description" rows="4" placeholder="Popište podrobně, co potřebujete vyřešit..."></textarea>
      </div>

      <div class="form-group">
        <label>Příloha (Screenshot / Log)</label>
        <div class="kb-file-upload" [class.has-file]="selectedFile">
          <input type="file" (change)="onFileSelected($event)" id="file-input">
          <label for="file-input" class="file-label">
            <span class="file-icon">{{ selectedFile ? '✓' : '↑' }}</span>
            <span class="file-info">{{ selectedFile ? selectedFile.name : 'Vybrat soubor nebo přetáhnout sem' }}</span>
          </label>
        </div>
      </div>

      <div class="kb-form-actions">
        <button type="submit" class="kb-btn-primary" [disabled]="supportForm.invalid || (loadingService.isLoading$ | async)">
          <span>
            <ng-container *ngIf="(loadingService.isLoading$ | async); else normalText">
              ODESÍLÁM...
            </ng-container>
            <ng-template #normalText>ODESLAT POŽADAVEK</ng-template>
          </span>
        </button>
      </div>
    </form>
  </ng-container>

  <ng-template #thankYouMessage>
    <div class="kb-success-state">
      <div class="success-check">✓</div>
      <h2>Požadavek byl odeslán</h2>
      <p>Váš ticket byl úspěšně zaevidován pod ID: <strong>#{{ lastTicketId }}</strong></p>
      <button class="kb-btn-outline" (click)="isSubmitted = false; initForm(); selectedFile = null;">
        Vytvořit další požadavek
      </button>
    </div>
  </ng-template>
</div>
