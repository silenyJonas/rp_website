<div class="kb-fullscreen-wrapper" [class.menu-open]="isMenuOpen">
  <header class="kb-top-bar">
    <div class="kb-brand">
      <button class="menu-toggle" (click)="toggleMenu()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <span class="logo-square">R</span>
      <span class="brand-text">Wiki System</span>
    </div>
    <div class="kb-header-actions">
      <a routerLink="/admin/dashboard" class="exit-link">Exit</a>
    </div>
  </header>

  <div class="kb-container">
    <aside class="kb-sidebar" [class.open]="isMenuOpen">
      <nav class="kb-nav">
        <div class="nav-group">
          <span class="group-title">General</span>
          <ul>
            <li><a routerLink="introductions" (click)="closeMenu()" routerLinkActive="active-kb"><span class="num">01.</span> Introductions</a></li>
            <li><a routerLink="news" (click)="closeMenu()" routerLinkActive="active-kb"><span class="num">02.</span> Novinky</a></li>
            <li><a routerLink="security" (click)="closeMenu()" routerLinkActive="active-kb"><span class="num">03.</span> Přístup</a></li>
            <li><a routerLink="contacts" (click)="closeMenu()" routerLinkActive="active-kb"><span class="num">04.</span> Kontakty</a></li>
          </ul>
        </div>

        <div class="nav-group">
          <span class="group-title">Roles</span>
          <ul>
            <li><a routerLink="sales-rep" (click)="closeMenu()" routerLinkActive="active-kb"><span class="num">05.</span> Sales Rep</a></li>
          </ul>
        </div>

        <div class="nav-group">
          <span class="group-title">Support</span>
          <ul>
            <li>
              <a routerLink="support-form" (click)="closeMenu()" routerLinkActive="active-kb">
                <span class="num">INT.</span> Support Form
              </a>
            </li>
          </ul>
        </div>
      </nav>
    </aside>

    <div class="kb-overlay" *ngIf="isMenuOpen" (click)="closeMenu()"></div>

    <main class="kb-main-content">
      <div class="content-wrapper">
        <router-outlet></router-outlet>
        
        <div class="welcome-view" *ngIf="isRootPath()">
          <span class="doc-code">SYSTEM_READY</span>
          <h1>Documentation</h1>
          <p>Vyberte kapitolu z menu pro pokračování.</p>
        </div>
      </div>
    </main>
  </div>
</div>
