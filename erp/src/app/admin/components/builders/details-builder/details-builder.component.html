<div class="popup-overlay" (mousedown)="onOverlayClick($event)">
  <div class="form-container wide-style" (click)="$event.stopPropagation()">
    
    <div class="form-header">
      <h2 class="header-title">Detaily záznamu</h2>
      <button class="close-button" (click)="onClose()" aria-label="Zavřít">
        &times;
      </button>
    </div>

    <div class="details-content">
      <div *ngIf="itemData" class="details-grid">
        <div *ngFor="let column of itemDetailColumns" class="details-row">
          <div class="label-cell">
            {{ column.displayName }}
          </div>
          <div class="value-cell">
            <ng-container [ngSwitch]="column.type">
              
              <div *ngSwitchCase="'file'">
                <div *ngIf="getValueByPath(itemData, column.key) as fileUrl; else noFile">
                  <div class="file-actions">
                    <a [href]="fileUrl" target="_blank" class="btn-action view">📄 Zobrazit</a>
                    <button type="button" (click)="downloadFile(fileUrl)" class="btn-action download">
                  📥 Stáhnout
                </button>
                  </div>
                </div>
                <ng-template #noFile><span class="text-muted">Není přiložena</span></ng-template>
              </div>

              <div *ngSwitchDefault>
                {{ getFormattedValue(itemData, column.key, column) || '-' }}
              </div>
              
            </ng-container>
          </div>
        </div>
      </div>
    </div>
    
    <div class="form-footer">
      <button class="btn-close-flat" (click)="onClose()">Zavřít</button>
    </div>
  </div>
</div>
