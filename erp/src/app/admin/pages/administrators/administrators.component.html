<div class="user-request-container container mx-auto p-4">
  <div *ngIf="isLoading" class="text-center text-blue-500">Načítání dat...</div>
  <div *ngIf="isLoading" class="text-center text-blue-500">
    <button class="neutral_button" style="margin-top: 15px;" (click)="refreshData()">
      Znovu načíst data
    </button>
  </div>
  
  <div *ngIf="errorMessage" class="text-center text-red-500">{{ errorMessage }}</div>
  
  <div *ngIf="!isLoading && !errorMessage">
    <div class="toolbar-actions m-b-t-5">
      <div class="table-header">Správa účtů</div>
      <div class="toolbar-actions-in">
        <button (click)="toggleFilters()" class="btn-filter small-btn">
          {{ isFilterVisible ? '✕ Skrýt' : '🔍 Filtry' }}
        </button>
        <button *ngIf="!showTrashTable" class="btn-create small-btn" (click)="handleCreateFormOpened()">
          ➕ Přidat
        </button>
        <button class="btn-export small-btn" (click)="exportActiveTable()">
          📥 Export
        </button>
        <button *appHasPermission="'view-deleted'" (click)="toggleTable()" class="btn-trash small-btn">
          {{ showTrashTable ? '📋 Aktivní' : '🗑️ Smazané' }}
        </button>
      </div>
    </div>

    <div class="main-content-layout">
      <div class="filter-side-panel" [class.active]="isFilterVisible">
        <app-generic-filter-form
          [filterColumns]="filterColumns"
          [initialFilters]="{ 
            user_login_id: filterUserLoginId, 
            user_email: filterUserEmail, 
            last_login_at: filterLastLoginAt,
            created_at: filterCreatedAt,
            updated_at: filterUpdatedAt,
            role_name: filterRoleName
          }"
          [initialSortBy]="filterSortBy"
          [initialSortDirection]="filterSortDirection"
          (filtersApplied)="applyFilters($event)"
          (filtersCleared)="clearFilters()">
        </app-generic-filter-form>
      </div>

      <div class="table-and-pagination-container">
        <app-generic-table #activeTable *ngIf="!showTrashTable"
          [buttons]="buttons"
          [data]="data"
          [columns]="tableColumns"
          [isFullWidth]="isTableFullWidth"
          [tableCaption]="'Seznam administrátorů'"
          [isLoading]="isLoading"
          [apiEndpoint]="apiEndpoint"
          [uploadsBaseUrl]="'https://your-upload-domain.com/uploads/'"
          [isAdminTable]="isAdminTable"
          (itemDeleted)="handleItemDeleted()"
          (createFormOpened)="handleCreateFormOpened()"
          (editFormOpened)="handleEditFormOpened($event)"
          (viewDetailsOpened)="handleViewDetails($event)"
          (resetPasswordFormOpened)="handleResetPasswordFormOpened($event)">
        </app-generic-table>

        <app-generic-trash-table *ngIf="showTrashTable"
          [data]="trashData"
          [columns]="trashTableColumns"
          [tableCaption]="'Obnova smazaných dat'"
          [isLoading]="isLoading"
          [apiEndpoint]="apiEndpoint"
          [uploadsBaseUrl]="'https://your-upload-domain.com/uploads/'"
          (itemRestored)="handleItemRestored()">
        </app-generic-trash-table>

        <label *ngIf="!showTrashTable" class="checkbox-container m-l-10 text-xs">
          <input type="checkbox" [(ngModel)]="isTableFullWidth"> Full-width
        </label>

        <app-pagination-buttons
          [currentPage]="showTrashTable ? trashCurrentPage : currentPage"
          [totalPages]="showTrashTable ? trashTotalPages : totalPages"
          [totalItems]="showTrashTable ? trashTotalItems : totalItems"
          [itemsPerPage]="showTrashTable ? trashItemsPerPage : itemsPerPage"
          [dataLength]="showTrashTable ? trashData.length : data.length"
          (pageChange)="onHandlePageChange($event)"
          (itemsPerPageChange)="onHandleItemsPerPageChange($event)">
        </app-pagination-buttons>
      </div>
    </div>
  </div>
</div>

<app-generic-form 
  *ngIf="showCreateForm" 
  [inputDefinitions]="formFields" 
  [formDataToEdit]="selectedItemForEdit"
  (formSubmitted)="handleFormSubmitted($event)"
  (formCanceled)="onCancelForm()">
</app-generic-form>

<app-generic-form
  *ngIf="showResetPasswordForm"
  [inputDefinitions]="resetPasswordFormFields"
  [formDataToEdit]="selectedItemForEdit"
  [passwordReset]="true"
  (formSubmitted)="handleResetPasswordFormSubmitted($event)"
  (formCanceled)="handleResetPasswordFormClosed()"
></app-generic-form>

<app-generic-details 
  *ngIf="showDetails" 
  [itemDetailColumns]="detailsColumns"
  [itemData]="selectedItemForDetails"
  (closeDetails)="handleCloseDetails()">
</app-generic-details>
