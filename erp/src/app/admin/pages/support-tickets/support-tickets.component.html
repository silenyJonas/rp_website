<div class="user-request-container container mx-auto p-4">
  <div *ngIf="isLoading" class="text-center text-blue-500">Načítání ticketů...</div>
  <div *ngIf="isLoading" class="text-center text-blue-500">
    <button class="neutral_button" style="margin-top: 15px;" (click)="refreshData()">Znovu načíst data</button>
  </div>
  
  <div *ngIf="errorMessage" class="text-center text-red-500">{{ errorMessage }}</div>

  <div *ngIf="!isLoading && !errorMessage">
    <div class="main-content-layout">
      <div class="filter-side-panel" [class.active]="isFilterVisible">
        <app-generic-filter-form
          [filterColumns]="filterColumns"
          [initialFilters]="filters"
          [initialSortBy]="filters.sort_by"
          [initialSortDirection]="filters.sort_direction"
          (filtersApplied)="applyFilters($event)"
          (filtersCleared)="clearFilters()">
        </app-generic-filter-form>
      </div>

      <div class="table-and-pagination-container">
        <div class="flex space-x-2 m-b-10">
          <button (click)="toggleFilters()" class="neutral_button">
            {{ isFilterVisible ? '✕ Skrýt filtry' : 'Zobrazit filtry' }}
          </button>
          <button *appHasPermission="'view-deleted'" (click)="toggleTable()" class="neutral_button p-l-10">
            {{ showTrashTable ? 'Zobrazit Aktivní Tikety' : 'Zobrazit Koš' }}
          </button>
        </div>

        <app-generic-table *ngIf="!showTrashTable"
          [buttons]="buttons"
          [data]="data"
          [columns]="columns"
          [tableCaption]="'Seznam Support Ticketů'"
          [apiEndpoint]="apiEndpoint"
          (itemDeleted)="forceFullRefresh()"
          (editFormOpened)="handleEditFormOpened($event)"
          (viewDetailsOpened)="handleViewDetails($event)">
        </app-generic-table>

        <app-generic-trash-table *ngIf="showTrashTable"
          [data]="trashData"
          [columns]="trashColumns"
          [tableCaption]="'Koš smazaných ticketů'"
          [apiEndpoint]="apiEndpoint"
          (itemRestored)="forceFullRefresh()">
        </app-generic-trash-table>

        <div class="pagination-controls-wrapper" *ngIf="!showTrashTable">
          <div class="text-sm text-gray-700 p-b-10">
            Zobrazuji {{ (currentPage - 1) * itemsPerPage + 1 }} - {{ (currentPage - 1) * itemsPerPage + data.length }} z celkem {{ totalItems }} záznamů.
          </div>
          <div class="flex items-center space-x-2 pg-m p-b-10">
            <select (change)="onItemsPerPageChange($event)" class="items-per-page-select" [(ngModel)]="itemsPerPage">
              <option value="5">5</option>
              <option value="15">15</option>
              <option value="50">50</option>
            </select>
          </div>
          <nav class="pagination-nav">
            <button (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1" class="pagination-button"> < </button>
            <button *ngFor="let page of pagesArray" (click)="goToPage(page)" [ngClass]="{ 'active-page': page === currentPage }" class="pagination-button">{{ page }}</button>
            <button (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages" class="pagination-button"> > </button>
          </nav>
        </div>

        <div class="pagination-controls-wrapper" *ngIf="showTrashTable">
            </div>
      </div>
    </div>
  </div>
</div>

<app-generic-form *ngIf="showCreateForm" [inputDefinitions]="formFields" [formDataToEdit]="selectedItemForEdit" (formSubmitted)="handleFormSubmitted($event)" (formCanceled)="showCreateForm = false"></app-generic-form>
<app-generic-details *ngIf="showDetails" [itemDetailColumns]="detailsColumns" [itemData]="selectedItemForDetails" (closeDetails)="showDetails = false"></app-generic-details>
