<div class="user-request-container container mx-auto p-4">
  <div *ngIf="isLoading" class="text-center text-blue-500">Načítání dat...</div>
  <div *ngIf="isLoading" class="text-center text-blue-500">
    <button class="neutral_button" style="margin-top: 15px;" (click)="refreshData()">
      Znovu načíst data
    </button>
  </div>
  
  <div *ngIf="errorMessage" class="text-center text-red-500">{{ errorMessage }}</div>
  <div *ngIf="errorMessage" class="text-center text-red-500">
    <button class="neutral_button" style="margin-top: 15px;" (click)="refreshData()">
      Znovu načíst data
    </button>
  </div>

  <div *ngIf="!isLoading && !errorMessage">
    <div class="toolbar-actions m-b-20">
      <div class="flex flex-wrap gap-2 items-center">
        <button (click)="toggleFilters()" class="neutral_button">
          {{ isFilterVisible ? '✕ Skrýt filtry' : 'Zobrazit filtry' }}
        </button>

        <button *appHasPermission="'view-deleted'" (click)="toggleTable()" class="neutral_button">
          {{ showTrashTable ? 'Zobrazit Aktivní' : 'Zobrazit Smazané' }}
        </button>

        <button class="neutral_button" (click)="exportActiveTable()">
          Exportovat do CSV
        </button>

        <button *ngIf="!showTrashTable" class="confirm_button" (click)="handleCreateFormOpened()">
          Přidat záznam
        </button>

        <label class="checkbox-container m-l-10">
          <input type="checkbox" [(ngModel)]="isTableFullWidth"> Plná šířka tabulky
        </label>
      </div>
    </div>

    <div class="main-content-layout">
      <div class="filter-side-panel" [class.active]="isFilterVisible">
        <app-generic-filter-form
          [filterColumns]="filterColumns"
          [initialFilters]="{ 
            search: filterSearch, 
            status: filterStatus, 
            priority: filterPriority, 
            contact_email: filterEmail,
            contact_phone: filterPhone,
            thema: filterThema,
            id: filterId,
            order_description: filterDescription,
            created_at: filterCreatedAt,
            updated_at: filterUpdatedAt
          }"
          [initialSortBy]="filterSortBy"
          [initialSortDirection]="filterSortDirection"
          (filtersApplied)="applyFilters($event)"
          (filtersCleared)="clearFilters()">
        </app-generic-filter-form>
      </div>

      <div class="table-and-pagination-container">
        <app-generic-table #activeTable *ngIf="!showTrashTable"
          [buttons]="buttons"
          [data]="data"
          [columns]="userRequestColumns"
          [isFullWidth]="isTableFullWidth"
          [tableCaption]="'Seznam požadavků na provize'"
          [isLoading]="isLoading"
          [apiEndpoint]="apiEndpoint"
          [uploadsBaseUrl]="'https://your-upload-domain.com/uploads/'"
          (itemDeleted)="handleItemDeleted()"
          (createFormOpened)="handleCreateFormOpened()"
          (editFormOpened)="handleEditFormOpened($event)"
          (viewDetailsOpened)="handleViewDetails($event)">
        </app-generic-table>

        <app-generic-trash-table *ngIf="showTrashTable"
          [data]="trashData"
          [columns]="trashUserRequestColumns"
          [tableCaption]="'Obnova dat'"
          [isLoading]="isLoading"
          [apiEndpoint]="apiEndpoint"
          [uploadsBaseUrl]="'https://your-upload-domain.com/uploads/'"
          (itemRestored)="handleItemRestored()">
        </app-generic-trash-table>

        <div class="pagination-controls-wrapper" *ngIf="!showTrashTable">
          <div class="text-sm text-gray-700 p-b-10">
            Zobrazuji {{ (currentPage - 1) * itemsPerPage + 1 }} - {{ (currentPage - 1) * itemsPerPage + data.length }} z celkem {{ totalItems }} záznamů.
          </div>
          <div class="flex items-center space-x-2 pg-m p-b-10">
            <label for="itemsPerPage" class="text-sm text-gray-700">Položek na stránku:</label>
            <select id="itemsPerPage" (change)="onItemsPerPageChange($event)"
                    class="items-per-page-select" [(ngModel)]="itemsPerPage">
              <option value="5">5</option>
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="20">20</option>
              <option value="50">50</option>
            </select>
          </div>
          <nav class="pagination-nav" aria-label="Pagination">
            <button (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1" class="pagination-button">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
            </button>
            <ng-container *ngFor="let page of pagesArray">
              <button (click)="goToPage(page)" [ngClass]="{ 'active-page': page === currentPage }" class="pagination-button">{{ page }}</button>
            </ng-container>
            <button (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages" class="pagination-button">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
            </button>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>

<app-generic-form 
  *ngIf="showCreateForm" 
  [inputDefinitions]="formFields" 
  [formDataToEdit]="selectedItemForEdit"
  (formSubmitted)="handleFormSubmitted($event)"
  (formCanceled)="onCancelForm()">
</app-generic-form>

<app-generic-details 
  *ngIf="showDetails" 
  [itemDetailColumns]="detailsColumns"
  [itemData]="selectedItemForDetails"
  (closeDetails)="handleCloseDetails()">
</app-generic-details>
