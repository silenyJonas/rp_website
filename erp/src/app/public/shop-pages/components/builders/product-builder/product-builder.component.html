<div class="product-card" *ngIf="product">
  <div class="product-image-container" [routerLink]="['/eshop/produkt', product.slug]">
    
    <!-- Obrázek vs Placeholder -->
    <img *ngIf="getThumbnailUrl() !== 'assets/images/placeholder-product.png'; else noImage"
         [src]="getThumbnailUrl()" 
         [alt]="product.name" 
         class="product-img">
    
    <ng-template #noImage>
      <div class="no-image-placeholder">
        <span>BEZ OBRÁZKU</span>
      </div>
    </ng-template>
    
    <div class="badge-overlay" *ngIf="product.is_featured">
      <span class="badge featured">Tip</span>
    </div>
  </div>

  <div class="product-info">
    <div class="info-top">
      <h3 class="product-title" [routerLink]="['/eshop/produkt', product.slug]">
        {{ product.name }}
      </h3>
      
      <!-- Skladová dostupnost (stejná logika jako v detailu) -->
      <div class="product-stock">
        <span class="stock-badge" [ngClass]="{
          'in-stock': product.stock_quantity >= 5,
          'low-stock': product.stock_quantity > 0 && product.stock_quantity < 5,
          'out-of-stock': product.stock_quantity <= 0
        }">
          <ng-container *ngIf="product.stock_quantity >= 5">● Skladem > 5 ks</ng-container>
          <ng-container *ngIf="product.stock_quantity > 0 && product.stock_quantity < 5">● Skladem {{ product.stock_quantity }} ks</ng-container>
          <ng-container *ngIf="product.stock_quantity <= 0">○ Vyprodáno</ng-container>
        </span>
      </div>
    </div>

    <div class="product-footer">
      <div class="price-box">
        <span class="price-value">{{ getFormattedPrice() }}</span>
      </div>
      
      <button class="btn-detail" [routerLink]="['/eshop/produkt', product.slug]">
        <span>Detail</span>
      </button>
    </div>
  </div>
</div>
