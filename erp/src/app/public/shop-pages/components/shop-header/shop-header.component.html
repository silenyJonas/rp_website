<header class="shop-header" [class.scrolled]="isScrolled">
  <div class="shop-container">
    <!-- Logo -->
    <div class="shop-logo" routerLink="/">
      <span class="brand-name">YOUR<span class="brand-accent">APP</span></span>
      <span class="shop-badge">STORE</span>
    </div>

    <div class="shop-actions">
      <!-- Kontakt -->
      <div class="contact-info">
        <a href="mailto:info@yourapp.cz" class="contact-link">info@yourapp.cz</a>
        <a href="tel:+420123456789" class="contact-link">+420 123 456 789</a>
      </div>

      <div class="divider"></div>

      <!-- Custom Dropdowns -->
      <div class="selectors">
        <!-- Jazyk -->
        <div class="custom-dropdown" (click)="toggleLang()">
          <span class="selected-val">{{ selectedLang }}</span>
          <svg class="chevron" [class.open]="showLang" width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          
          <div class="dropdown-menu" *ngIf="showLang">
            <div class="dropdown-item" (click)="selectLang('CZ')">CZ</div>
            <div class="dropdown-item" (click)="selectLang('EN')">EN</div>
          </div>
        </div>

        <!-- Měna -->
        <div class="custom-dropdown" (click)="toggleCurrency()">
          <span class="selected-val">{{ selectedCurrency }}</span>
          <svg class="chevron" [class.open]="showCurrency" width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          
          <div class="dropdown-menu" *ngIf="showCurrency">
            <div class="dropdown-item" (click)="selectCurrency('CZK')">CZK</div>
            <div class="dropdown-item" (click)="selectCurrency('EUR')">EUR</div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Košík -->
      <button class="cart-trigger" (click)="openCart()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        
        <!-- Používáme čistý signál bez JS funkcí, kompilátor to bez problému sežere -->
        <span class="cart-dot" *ngIf="cartService.totalQuantity() > 0">
          {{ cartService.totalQuantity() }}
        </span>
      </button>
    </div>
  </div>
</header>
